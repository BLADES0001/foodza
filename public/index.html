<!DOCTYPE html>
<html>

<head>

  <title>Hotel Balaji Inn</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

  <div class="fixed-top">

    <div class="top-icons">

      <div class="menu-btn">☰</div>

      <div class="profile-btn">👤</div>

    </div>

    <div class="logo-box">

      <img src="/logo.png" class="logo">

      <h1>Hotel Balaji Inn</h1>

      <div class="tagline">
        Great Food, Great Experience
      </div>

    </div>

    <div class="search-box">

      <span>🔍</span>

      <input
      id="search"
      placeholder="Search food..."
      >

    </div>

    
      <div class="categories">

  <button class="cat active" onclick="filterCategory('All')">All</button>

  <button class="cat" onclick="filterCategory('Appetizea')">Appetizea</button>

  <button class="cat" onclick="filterCategory('Salad')">Salad</button>

  <button class="cat" onclick="filterCategory('Raita')">Raita</button>

  <button class="cat" onclick="filterCategory('Soup Veg')">Soup Veg</button>

  <button class="cat" onclick="filterCategory('Soup Non Veg')">Soup Non Veg</button>

  <button class="cat" onclick="filterCategory('Starter Veg')">Starter Veg</button>

  <button class="cat" onclick="filterCategory('Egg Dishes')">Egg Dishes</button>

  <button class="cat" onclick="filterCategory('South Indian Starters')">South Indian Starters</button>

  <button class="cat" onclick="filterCategory('Sea Food')">Sea Food</button>

  <button class="cat" onclick="filterCategory('South Indian Main Course')">South Indian Main Course</button>

  <button class="cat" onclick="filterCategory('Tandoori Veg')">Tandoori Veg</button>

  <button class="cat" onclick="filterCategory('Tandoori Non Veg')">Tandoori Non Veg</button>

  <button class="cat" onclick="filterCategory('Chinese Veg')">Chinese Veg</button>

  <button class="cat" onclick="filterCategory('Chinese Non Veg')">Chinese Non Veg</button>

  <button class="cat" onclick="filterCategory('Chinese Rice Veg')">Chinese Rice Veg</button>

  <button class="cat" onclick="filterCategory('Chinese Rice Non Veg')">Chinese Rice Non Veg</button>

  <button class="cat" onclick="filterCategory('Noodles Veg')">Noodles Veg</button>

  <button class="cat" onclick="filterCategory('Noodles Non Veg')">Noodles Non Veg</button>

  <button class="cat" onclick="filterCategory('North Indian Veg')">North Indian Veg</button>

  <button class="cat" onclick="filterCategory('North Indian Non Veg')">North Indian Non Veg</button>

  <button class="cat" onclick="filterCategory('Rotti')">Rotti</button>

  <button class="cat" onclick="filterCategory('Biryani Veg')">Biryani Veg</button>

  <button class="cat" onclick="filterCategory('Biryani Non Veg')">Biryani Non Veg</button>

  <button class="cat" onclick="filterCategory('Rice')">Rice</button>

  <button class="cat" onclick="filterCategory('Mocktails')">Mocktails</button>

  <button class="cat" onclick="filterCategory('Fruit Juice')">Fruit Juice</button>

  <button class="cat" onclick="filterCategory('Milk Shake')">Milk Shake</button>

  <button class="cat" onclick="filterCategory('Desserts')">Desserts</button>

  <button class="cat" onclick="filterCategory('Aerated Drinks')">Aerated Drinks</button>

</div>


  </div>

  <div id="menu-section">

    <div id="food-list"></div>

  </div>

  <!-- FLOATING CART BUTTON -->

  <div class="cart-toggle" onclick="toggleCart()">
    🛒 Cart (<span id="cart-count">0</span>)
  </div>

  <!-- CART POPUP -->

  <div class="cart" id="cartBox">

    <div class="cart-top">

      <div class="cart-title">
        🛒 Your Cart
      </div>

      <div class="clear-cart" onclick="clearCart()">
  Clear
</div>

    </div>

    <div id="cart"></div>

    <div class="bottom-row" style="display:flex;flex-direction:column;gap:10px;">

  <!-- ORDER TYPE -->

  <select id="orderType" onchange="toggleOrderType()">
    <option value="dinein">Dine In</option>
    <option value="delivery">Delivery</option>
  </select>

  <!-- TABLE NUMBER -->

  <input
    type="text"
    id="tableNo"
    placeholder="Enter Table No"
  >

  <!-- DELIVERY LOCATION -->

  <div id="deliveryBox" style="display:none;">

    <button onclick="getLiveLocation()">
      📍 Share Live Location
    </button>

    <div id="locationStatus"></div>

  </div>

  <button
    class="checkout-btn"
    onclick="checkout()"
  >
    Checkout →
  </button>

</div>

  </div>

</div>

<script src="script.js"></script>

</body>

</html>
